<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clothes Shop</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, Arial;
    background: #f5f5f7;
    color: #1d1d1f;
    overflow-x: hidden;
}

/* HEADER */
header {
    position: fixed;
    width: 100%;
    top: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(15px);
    z-index: 1000;
}

.logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 600;
}

.logo img {
    width: 30px;
}

/* NAV */
nav a {
    margin-left: 20px;
    text-decoration: none;
    color: black;
    font-weight: 500;
    transition: 0.3s;
}

nav a:hover {
    opacity: 0.6;
}

/* SECTIONS */
section {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;

    opacity: 0;
    transform: translateY(80px) scale(0.95);
    transition: all 1s ease;
}

section.active {
    opacity: 1;
    transform: translateY(0) scale(1);
}

/* HERO */
.hero h1 {
    font-size: 90px;
    margin: 0;
    letter-spacing: -2px;
}

.hero p {
    font-size: 28px;
    color: #6e6e73;
}

/* BUTTON */
button {
    margin-top: 30px;
    padding: 14px 40px;
    border-radius: 30px;
    border: none;
    background: black;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.4s;
}

button:hover {
    transform: scale(1.05);
    background: #222;
}

/* IMAGE BLOCK */
.image-block img {
    width: 70%;
    border-radius: 30px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.3);
    transition: transform 1s ease, opacity 1s;
}

/* PARALLAX EFFECT */
.image-block.active img {
    transform: scale(1.08);
}

/* DARK */
.dark {
    background: black;
    color: white;
}

.dark p {
    color: #aaa;
}

/* SCROLL INDICATOR */
.scroll {
    position: absolute;
    bottom: 30px;
    font-size: 14px;
    opacity: 0.5;
    animation: bounce 2s infinite;
}

@keyframes bounce {
    0%,100% { transform: translateY(0);}
    50% { transform: translateY(10px);}
}

</style>
</head>

<body>

<header>
    <div class="logo">
        <img src="https://cdn-icons-png.flaticon.com/512/892/892458.png">
        Clothes Shop
    </div>
    <nav>
        <a href="#">Home</a>
        <a href="#">Shop</a>
        <a href="#">Contact</a>
    </nav>
</header>

<!-- HERO -->
<section class="hero active">
    <h1>NEW COLLECTION</h1>
    <p>Your style. Your rules.</p>
    <button>Shop Now</button>
    <div class="scroll">Scroll ↓</div>
</section>

<!-- IMAGE -->
<section class="image-block">
    <img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b">
</section>

<!-- SECOND -->
<section>
    <h1>Premium Quality</h1>
    <p>Designed for comfort and style.</p>
</section>

<!-- DARK -->
<section class="dark">
    <h1>Join Us</h1>
    <p>Be part of the fashion future.</p>
</section>

<script>
const sections = document.querySelectorAll("section");

function showOnScroll() {
    sections.forEach(sec => {
        const top = sec.getBoundingClientRect().top;
        if (top < window.innerHeight - 100) {
            sec.classList.add("active");
        }
    });
}

window.addEventListener("scroll", showOnScroll);
showOnScroll();
</script>

</body>
</html>
